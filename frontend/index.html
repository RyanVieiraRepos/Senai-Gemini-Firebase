<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <h1>Calculadora de IMC</h1>
        <p>Índice de Massa Corporal</p>
      </div>

      <div class="form-group">
        <label for="peso">Peso</label>
        <div class="input-wrapper">
          <input type="number" id="peso" placeholder="Ex: 70" min="1" max="500" step="0.1" />
          <span class="input-unit">kg</span>
        </div>
      </div>

      <div class="form-group">
        <label for="altura">Altura</label>
        <div class="input-wrapper">
          <input type="number" id="altura" placeholder="Ex: 1.75" min="0.5" max="3" step="0.01" />
          <span class="input-unit">m</span>
        </div>
      </div>

      <button onclick="calcular()">Calcular IMC</button>

      <div class="error-msg" id="erro"></div>

      <div class="result" id="resultado">
        <div class="result-label">Seu IMC</div>
        <div class="result-value" id="imc-valor"></div>
        <div class="result-category" id="imc-categoria"></div>
        <div class="result-tip" id="imc-tip"></div>
      </div>

      <div class="table-section">
        <div class="table-title">Últimos Cálculos (Atualiza a cada 2 minutos)</div>
        <table>
          <thead>
            <tr>
              <th>Usuário</th>
              <th>IMC</th>
              <th>Categoria</th>
              <th>Data/Hora</th>
            </tr>
          </thead>
          <tbody>
            <!-- Results will be populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
